<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IELTS Collocation Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#e9efec; --bg2:#dde6e2;
  --ink:#13303a; --ink-soft:#3f5963;
  --paper:#ffffff;
  --teal:#1f8a70; --teal-d:#136655;
  --amber:#bd7b1e; --amber-d:#9a6212;
  --line:#d3ddd8;
  --shadow:0 18px 40px -18px rgba(19,48,58,.45), 0 4px 12px -6px rgba(19,48,58,.25);
  --r:22px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:"Be Vietnam Pro",system-ui,sans-serif; color:var(--ink);
  background:
    radial-gradient(1200px 600px at 15% -10%, #f3f7f5 0%, rgba(243,247,245,0) 60%),
    radial-gradient(900px 500px at 100% 0%, #e3ece8 0%, rgba(227,236,232,0) 55%),
    linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
  min-height:100dvh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased;
}
.wrap{width:100%; max-width:680px; margin:0 auto; padding:18px 18px 28px; flex:1; display:flex; flex-direction:column}
header{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:14px}
.brand{font-family:"Bricolage Grotesque",sans-serif; font-weight:800; letter-spacing:-.02em; font-size:1.35rem; line-height:1; color:var(--ink)}
.brand small{display:block; font-family:"Be Vietnam Pro"; font-weight:500; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--teal-d); margin-top:6px}
.count{font-variant-numeric:tabular-nums; font-weight:600; font-size:.95rem; color:var(--ink-soft); white-space:nowrap}
.count b{color:var(--ink)}
.bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px}
.field{flex:1 1 160px; position:relative; min-width:140px}
select,input[type=search],input[type=text],textarea{
  width:100%; appearance:none; border:1px solid var(--line); background:var(--paper);
  color:var(--ink); font:inherit; font-size:.9rem; padding:10px 34px 10px 12px; border-radius:12px;
}
input[type=search]{padding-right:12px}
.field.sel::after{content:"▾"; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--teal-d); pointer-events:none; font-size:.8rem}
select:focus,input:focus,textarea:focus,button:focus-visible,.card:focus-visible{outline:2.5px solid var(--teal); outline-offset:2px}
.prog{height:7px; background:#cfded7; border-radius:99px; overflow:hidden; margin:2px 0 16px}
.prog>i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--teal),var(--teal-d)); transition:width .35s ease}

.stage{flex:1; display:flex; align-items:center; justify-content:center; perspective:1600px; min-height:330px}
.card{width:100%; max-width:560px; aspect-ratio:3/2; min-height:300px; position:relative; transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.2,.7,.2,1); cursor:pointer; border-radius:var(--r); border:none; background:none; padding:0; font:inherit; text-align:left;}
.card.flip{transform:rotateY(180deg)}
.face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; background:var(--paper);
  border-radius:var(--r); box-shadow:var(--shadow); padding:30px 30px 26px; display:flex; flex-direction:column; overflow:hidden;}
.face::before{content:""; position:absolute; left:0; top:0; bottom:0; width:7px; background:linear-gradient(180deg,var(--teal),var(--teal-d))}
.back::before{background:linear-gradient(180deg,var(--amber),var(--amber-d))}
.eyebrow{font-size:.7rem; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--teal-d)}
.back .eyebrow{color:var(--amber-d)}
.front{justify-content:center; align-items:flex-start}
.headword{font-family:"Bricolage Grotesque",sans-serif; font-weight:700; letter-spacing:-.025em; font-size:clamp(1.9rem,7.5vw,3.1rem); line-height:1.04; color:var(--ink); margin:14px 0 0}
.hint{position:absolute; bottom:18px; left:30px; right:30px; font-size:.78rem; color:var(--ink-soft); display:flex; align-items:center; gap:7px}
.hint .kbd{border:1px solid var(--line); border-bottom-width:2px; border-radius:6px; padding:1px 7px; font-size:.72rem; color:var(--ink-soft); background:#f6f9f7}
.badge-custom{position:absolute; top:18px; right:20px; font-size:.62rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#fff; background:var(--amber-d); padding:3px 9px; border-radius:99px; display:none}
.card.is-custom .badge-custom{display:inline-block}
.back{transform:rotateY(180deg); justify-content:flex-start; gap:13px}
.back .term{font-family:"Bricolage Grotesque",sans-serif; font-weight:700; font-size:clamp(1.2rem,4.6vw,1.6rem); letter-spacing:-.02em; color:var(--ink); margin-top:4px}
.block .lab{font-size:.68rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase; margin-bottom:3px}
.block.mean .lab{color:var(--amber-d)} .block.ex .lab{color:var(--teal-d)}
.mean .val{font-size:clamp(1.05rem,4vw,1.3rem); font-weight:600; color:var(--ink); line-height:1.3}
.ex .val{font-size:clamp(.95rem,3.4vw,1.08rem); color:var(--ink-soft); line-height:1.45}
.ex .val mark{background:linear-gradient(transparent 62%, #f3d9a6 62%); color:var(--ink); font-weight:600; padding:0 1px; border-radius:2px}
.divider{height:1px; background:var(--line); margin:2px 0}
.back .topic{margin-top:auto; font-size:.74rem; color:var(--ink-soft); letter-spacing:.02em}
.known-flag{position:absolute; top:18px; right:20px; font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--teal-d); display:none}
.card.is-known .known-flag{display:inline-block}

.nav{display:flex; gap:10px; margin-top:18px; align-items:stretch}
button{font-family:inherit; cursor:pointer; border-radius:13px; border:1px solid var(--line); background:var(--paper); color:var(--ink); font-weight:600; transition:transform .08s ease, background .15s, border-color .15s}
button:active{transform:translateY(1px)}
button[disabled]{opacity:.4; cursor:not-allowed}
.nav .side{flex:0 0 auto; width:54px; font-size:1.3rem; line-height:1; display:flex; align-items:center; justify-content:center}
.nav .flip{flex:1; font-size:1rem; background:var(--ink); color:#fff; border-color:var(--ink)}
.nav .flip:hover{background:#0c252e}
.toolbar{display:flex; gap:10px; margin-top:10px}
.toolbar button{flex:1; padding:11px 8px; font-size:.9rem}
.toolbar .add{background:var(--teal); color:#fff; border-color:var(--teal)}
.toolbar .add:hover{background:var(--teal-d)}
.toolbar .edit{flex:0 0 auto; padding:11px 16px; border-color:var(--amber); color:var(--amber-d)}
.toolbar .known.on{background:var(--teal); color:#fff; border-color:var(--teal)}
.toolbar .known.on::before{content:"✓ "}
.empty{text-align:center; color:var(--ink-soft); padding:46px 20px}
footer{text-align:center; font-size:.74rem; color:var(--ink-soft); margin-top:18px; line-height:1.6}

/* Modal */
.modal{position:fixed; inset:0; background:rgba(13,40,46,.5); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:18px; z-index:50}
.modal[hidden]{display:none}
.sheet{width:100%; max-width:440px; background:var(--paper); border-radius:20px; box-shadow:var(--shadow); padding:22px; max-height:92dvh; overflow:auto}
.sheet h2{font-family:"Bricolage Grotesque",sans-serif; font-weight:700; letter-spacing:-.02em; font-size:1.3rem; margin:0 0 4px}
.sheet p.sub{margin:0 0 16px; font-size:.82rem; color:var(--ink-soft)}
.sheet label{display:block; font-size:.74rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); margin:13px 0 5px}
.sheet input,.sheet textarea,.sheet select{padding:11px 12px}
.sheet textarea{min-height:62px; resize:vertical; line-height:1.4}
.sheet .req{color:var(--amber-d)}
.fErr{color:#b3261e; font-size:.82rem; margin-top:10px; min-height:1.1em}
.mbtns{display:flex; gap:10px; margin-top:18px}
.mbtns button{flex:1; padding:12px; font-size:.95rem}
.mbtns .primary{background:var(--ink); color:#fff; border-color:var(--ink)}
.mbtns .ghost{background:var(--paper)}
.mDelete{width:100%; margin-top:10px; padding:11px; font-size:.88rem; color:#b3261e; border-color:#e7c3bf; background:#fdf3f2}
.mDelete[hidden]{display:none}

@media (max-width:520px){ .face{padding:24px 22px 22px} .hint{left:22px;right:22px} .nav .side{width:48px} }
@media (prefers-reduced-motion:reduce){ .card{transition:none} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">IELTS Collocations<small>Flashcards · Band 5.5 → 6.0</small></div>
    <div class="count" id="count">–</div>
  </header>

  <div class="bar">
    <div class="field sel"><select id="topic" aria-label="Chọn chủ đề"></select></div>
    <div class="field"><input type="search" id="search" placeholder="Tìm cụm từ…" aria-label="Tìm cụm từ"></div>
  </div>
  <div class="prog" aria-hidden="true"><i id="progbar"></i></div>

  <div class="stage">
    <button class="card" id="card" aria-live="polite">
      <div class="face front">
        <span class="eyebrow">Collocation</span>
        <span class="badge-custom">Thẻ của bạn</span>
        <div class="headword" id="fw"></div>
        <div class="hint"><span class="kbd">Space</span> lật thẻ · <span class="kbd">←</span> <span class="kbd">→</span> chuyển</div>
      </div>
      <div class="face back">
        <span class="eyebrow">Nghĩa &amp; ví dụ</span>
        <span class="known-flag">✓ Đã thuộc</span>
        <div class="term" id="bw"></div>
        <div class="divider"></div>
        <div class="block mean"><div class="lab">Nghĩa</div><div class="val" id="bm"></div></div>
        <div class="block ex"><div class="lab">Example</div><div class="val" id="be"></div></div>
        <div class="topic" id="bt"></div>
      </div>
    </button>
    <div class="empty" id="empty" style="display:none">Chưa có thẻ nào ở đây.<br>Bấm <b>＋ Thêm thẻ</b> để tạo thẻ của riêng bạn.</div>
  </div>

  <div class="nav">
    <button class="side" id="prev" aria-label="Thẻ trước">‹</button>
    <button class="flip" id="flip">Lật thẻ</button>
    <button class="side" id="next" aria-label="Thẻ sau">›</button>
  </div>
  <div class="toolbar">
    <button class="add" id="addBtn">＋ Thêm thẻ</button>
    <button class="edit" id="editBtn" hidden>✎ Sửa</button>
    <button class="known" id="known">Đã thuộc</button>
  </div>
  <div class="toolbar">
    <button class="shuffle" id="shuffle">🔀 Trộn thẻ</button>
    <button class="reset" id="reset">↺ Xoá đánh dấu</button>
  </div>

  <footer>
    Mẹo: tự đặt một câu của riêng bạn cho mỗi cụm để nhớ lâu hơn.<br>
    Phím tắt: <b>Space</b> lật · <b>←/→</b> chuyển · <b>K</b> đã thuộc · <b>N</b> thêm thẻ
  </footer>
</div>

<!-- Add / Edit modal -->
<div class="modal" id="modal" hidden>
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="mTitle">
    <h2 id="mTitle">Thêm thẻ mới</h2>
    <p class="sub">Thêm collocation của riêng bạn vào bộ thẻ.</p>
    <label for="fC">Collocation <span class="req">*</span> (tiếng Anh)</label>
    <input type="text" id="fC" placeholder="vd: make a decision" autocomplete="off">
    <label for="fM">Nghĩa <span class="req">*</span> (tiếng Việt)</label>
    <input type="text" id="fM" placeholder="vd: đưa ra quyết định" autocomplete="off">
    <label for="fE">Ví dụ (tiếng Anh) — không bắt buộc</label>
    <textarea id="fE" placeholder="vd: We need to make a decision soon."></textarea>
    <label for="fT">Chủ đề</label>
    <div class="field sel"><select id="fT"></select></div>
    <input type="text" id="fTnew" placeholder="Tên chủ đề mới…" hidden style="margin-top:8px">
    <div class="fErr" id="fErr"></div>
    <div class="mbtns">
      <button class="ghost" id="mCancel">Huỷ</button>
      <button class="primary" id="mSave">Lưu thẻ</button>
    </div>
    <button class="mDelete" id="mDelete" hidden>🗑 Xoá thẻ này</button>
  </div>
</div>

  const cards=allCards();
  const add=(v,t)=>{const o=document.createElement('option');o.value=v;o.textContent=t;sel.appendChild(o);};
  add('__all__','Tất cả chủ đề ('+cards.length+' thẻ)');
  const mine=USER.length;
  if(mine) add('__mine__','★ Thẻ của tôi ('+mine+')');
  allTopics().forEach(t=>{ add(t, t+' ('+cards.filter(c=>c.topic===t).length+')'); });
  if([...sel.options].some(o=>o.value===cur)) sel.value=cur; else sel.value='__all__';
}

function escapeReg(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
const STOP=new Set(['a','an','the','to','of','on','in','for','with','your','you','my','his','her','their','its','someone','someones','each','other','and','or','be','is','am','are','no']);
function highlight(ex, coll){
  if(!ex) return '';
  const whole=[coll, coll.replace(/\b(a|an|the|your|someone'?s?)\b\s*/gi,'').trim()];
  for(const v of whole){ if(!v) continue; const re=new RegExp('('+escapeReg(v)+')','i'); if(re.test(ex)) return ex.replace(re,'<mark>$1</mark>'); }
  const words=coll.toLowerCase().replace(/[^a-z'\s]/g,'').split(/\s+/).filter(w=>w && !STOP.has(w.replace(/'s$/,'')));
  let out=ex, matched=false;
  for(const w of words){ const stem=w.replace(/(ing|ed|es|s)$/,''); const root=stem.length>=4?stem:w;
    const re=new RegExp('\\b('+escapeReg(root)+'[a-z]*)\\b','i'); if(re.test(out)){ out=out.replace(re,'<mark>$1</mark>'); matched=true; } }
  return matched?out:ex;
}

function buildDeck(){
  const topic=$('topic').value, q=$('search').value.trim().toLowerCase();
  deck=allCards().filter(c=>{
    if(topic==='__mine__'){ if(!c.custom) return false; }
    else if(topic!=='__all__' && c.topic!==topic) return false;
    if(q && !(c.c.toLowerCase().includes(q) || (c.m||'').toLowerCase().includes(q))) return false;
    return true;
  });
  pos=0; flipped=false; render();
}
function shuffle(){ for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];} pos=0; flipped=false; render(); }
function setFlip(v){ flipped=v; card.classList.toggle('flip',v); $('flip').textContent=v?'Xem mặt trước':'Lật thẻ'; }

function render(){
  const empty=deck.length===0;
  emptyEl.style.display=empty?'block':'none';
  card.style.display=empty?'none':'';
  document.querySelector('.nav').style.visibility=empty?'hidden':'visible';
  const kn=deck.filter(c=>known.has(c.id)).length;
  prog.style.width=(deck.length?(kn/deck.length*100):0)+'%';
  if(empty){ countEl.textContent='0 / 0'; editBtn.hidden=true; return; }
  if(pos>=deck.length) pos=deck.length-1;
  const c=deck[pos];
  countEl.innerHTML='<b>'+(pos+1)+'</b> / '+deck.length+' · thuộc '+kn;
  fw.textContent=c.c; bw.textContent=c.c; bm.textContent=c.m; be.innerHTML=highlight(c.e,c.c);
  bt.textContent='Chủ đề: '+c.topic;
  setFlip(false);
  card.classList.toggle('is-known',known.has(c.id));
  card.classList.toggle('is-custom',!!c.custom);
  knownBtn.classList.toggle('on',known.has(c.id));
  editBtn.hidden=!c.custom;
}
function go(d){ if(!deck.length) return; pos=(pos+d+deck.length)%deck.length; flipped=false; render(); }
function toggleKnown(){ if(!deck.length) return; const c=deck[pos]; known.has(c.id)?known.delete(c.id):known.add(c.id); lsSet(LS_KNOWN,[...known]); render(); }

/* ---- modal (add / edit) ---- */
function fillTopicSelect(selected){
  const sel=$('fT'); sel.innerHTML='';
  allTopics().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});
  const o=document.createElement('option');o.value='__new__';o.textContent='➕ Chủ đề mới…';sel.appendChild(o);
  sel.value = selected && [...sel.options].some(x=>x.value===selected) ? selected : (allTopics()[0]||'__new__');
  onTopicSelChange();
}
function onTopicSelChange(){ $('fTnew').hidden = $('fT').value!=='__new__'; }

function openModal(edit){
  editId = edit ? edit.id : null;
  $('mTitle').textContent = edit ? 'Sửa thẻ' : 'Thêm thẻ mới';
  $('fErr').textContent='';
  $('fC').value = edit ? edit.c : '';
  $('fM').value = edit ? edit.m : '';
  $('fE').value = edit ? (edit.e||'') : '';
  const curTopic=$('topic').value;
  fillTopicSelect(edit ? edit.topic : ((curTopic!=='__all__'&&curTopic!=='__mine__')?curTopic:'My Words'));
  $('mDelete').hidden = !edit;
  modal.hidden=false;
  setTimeout(()=>$('fC').focus(),30);
}
function closeModal(){ modal.hidden=true; editId=null; }

function saveFromModal(){
  const c=$('fC').value.trim(), m=$('fM').value.trim(), e=$('fE').value.trim();
  let topic=$('fT').value; if(topic==='__new__') topic=$('fTnew').value.trim()||'My Words';
  if(!c || !m){ $('fErr').textContent='Vui lòng nhập cả Collocation và Nghĩa.'; return; }
  if(editId!=null){
    const i=USER.findIndex(x=>x.id===editId);
    if(i>=0) USER[i]={...USER[i], c, m, e, topic};
  }else{
    USER.push({id:'u'+Date.now()+Math.floor(Math.random()*1000), topic, c, m, e, custom:true});
  }
  lsSet(LS_USER,USER);
  const targetTopic=topic;
  closeModal();
  buildTopicOptions('__mine__');
  $('topic').value='__mine__';
  $('search').value='';
  buildDeck();
  const idx=deck.findIndex(x=>x.c===c && x.m===m && x.topic===targetTopic);
  if(idx>=0){ pos=idx; render(); }
}
function deleteCurrent(){
  if(editId==null) return;
  if(!confirm('Xoá thẻ này khỏi bộ của bạn?')) return;
  USER=USER.filter(x=>x.id!==editId); known.delete(editId);
  lsSet(LS_USER,USER); lsSet(LS_KNOWN,[...known]);
  closeModal(); buildTopicOptions(); buildDeck();
}

/* ---- events ---- */
card.addEventListener('click',()=>setFlip(!flipped));
$('flip').addEventListener('click',e=>{e.stopPropagation(); setFlip(!flipped);});
$('prev').addEventListener('click',()=>go(-1));
$('next').addEventListener('click',()=>go(1));
$('shuffle').addEventListener('click',shuffle);
$('known').addEventListener('click',toggleKnown);
$('reset').addEventListener('click',()=>{ known.clear(); lsSet(LS_KNOWN,[]); render(); });
$('topic').addEventListener('change',buildDeck);
$('search').addEventListener('input',buildDeck);
$('addBtn').addEventListener('click',()=>openModal(null));
$('editBtn').addEventListener('click',()=>{ if(deck[pos]&&deck[pos].custom) openModal(deck[pos]); });
$('mCancel').addEventListener('click',closeModal);
$('mSave').addEventListener('click',saveFromModal);
$('mDelete').addEventListener('click',deleteCurrent);
$('fT').addEventListener('change',onTopicSelChange);
modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(); });

document.addEventListener('keydown',e=>{
  if(!modal.hidden){ if(e.key==='Escape') closeModal();
    else if(e.key==='Enter' && e.target.id!=='fE'){ e.preventDefault(); saveFromModal(); } return; }
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
  if(e.key===' '){e.preventDefault(); setFlip(!flipped);}
  else if(e.key==='ArrowRight') go(1);
  else if(e.key==='ArrowLeft') go(-1);
  else if(e.key.toLowerCase()==='k') toggleKnown();
  else if(e.key.toLowerCase()==='n'){ e.preventDefault(); openModal(null); }
});

buildTopicOptions('__all__');
buildDeck();
</script>
</body>
</html>
